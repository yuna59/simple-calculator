<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Calculator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="top-controls">
            <div class="language-selector">
                <button class="lang-btn active" onclick="setLanguage('en')">English</button>
                <button class="lang-btn" onclick="setLanguage('ko')">한국어</button>
                <button class="lang-btn" onclick="setLanguage('ja')">日本語</button>
                <button class="lang-btn" onclick="setLanguage('zh')">中文</button>
            </div>
            
            <div class="theme-toggle">
                <button class="theme-btn" id="themeBtn" onclick="toggleTheme()" title="Toggle dark mode">🌙</button>
            </div>
        </div>

        <div class="calculator">
            <div class="display">
                <input type="text" id="display" readonly placeholder="0">
            </div>
            <div class="buttons">
                <button class="btn clear" onclick="clearDisplay()" data-label="clear">C</button>
                <button class="btn clear" onclick="deleteLast()" data-label="delete">DEL</button>
                <button class="btn operator" onclick="appendOperator('/')">÷</button>
                <button class="btn operator" onclick="appendOperator('*')">×</button>

                <button class="btn" onclick="appendNumber('7')">7</button>
                <button class="btn" onclick="appendNumber('8')">8</button>
                <button class="btn" onclick="appendNumber('9')">9</button>
                <button class="btn operator" onclick="appendOperator('-')">-</button>

                <button class="btn" onclick="appendNumber('4')">4</button>
                <button class="btn" onclick="appendNumber('5')">5</button>
                <button class="btn" onclick="appendNumber('6')">6</button>
                <button class="btn operator" onclick="appendOperator('+')">+</button>

                <button class="btn" onclick="appendNumber('1')">1</button>
                <button class="btn" onclick="appendNumber('2')">2</button>
                <button class="btn" onclick="appendNumber('3')">3</button>
                <button class="btn operator" onclick="appendOperator('%')">%</button>

                <button class="btn zero" onclick="appendNumber('0')">0</button>
                <button class="btn" onclick="appendNumber('.')">.</button>
                <button class="btn equals" onclick="calculate()">=</button>
            </div>
        </div>
    </div>

    <script src="translations.js"></script>
    <script src="script.js"></script>
</body>
</html>
